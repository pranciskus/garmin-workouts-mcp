name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run tests in Docker
        run: docker compose run --build --rm tests

      - name: Read package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(f"version={data['project']['version']}")
          PY

      - name: Verify git tag matches project version
        run: |
          test "${GITHUB_REF_NAME#v}" = "${{ steps.version.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pranciskus/garmin-workouts-mcp
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=garmin-workouts-mcp
            org.opencontainers.image.description=Garmin Connect workouts MCP server with strength workout support.
            org.opencontainers.image.source=https://github.com/pranciskus/garmin-workouts-mcp
            io.modelcontextprotocol.server.name=io.github.pranciskus/garmin-workouts-mcp

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
